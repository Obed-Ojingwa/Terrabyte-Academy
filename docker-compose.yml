version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: terrabyte_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-TerraSecure2025!}
      POSTGRES_DB: terrabyte_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrabyte_user -d terrabyte_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://terrabyte_user:${DB_PASSWORD:-TerraSecure2025!}@postgres:5432/terrabyte_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    env_file: ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://terrabyte_user:${DB_PASSWORD:-TerraSecure2025!}@postgres:5432/terrabyte_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  celery_beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ./backend/.env.example
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
